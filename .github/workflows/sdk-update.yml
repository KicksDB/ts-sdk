name: Daily SDK Update & Publish

permissions:
  contents: write
  id-token: write

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm ci

      - name: Generate SDK
        run: npm run generate

      - name: Check and publish changes
        run: |
          git add .

          if git diff --staged --quiet; then
            echo "No changes detected. Skipping publish."
          else
            echo "Changes detected. Updating version and publishing..."
            
            git commit -m "chore: update generated SDK files [skip ci]"
            
            npm version patch -m "chore: release v%s [skip ci]"
            
            npm run build
            npm publish --access public
            
            git push origin main --follow-tags
          fi
